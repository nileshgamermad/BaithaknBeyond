<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTP Test — Baithak & Beyond</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FAF8F4;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #1a1a1a;
    }

    .card {
      width: min(440px, 92vw);
      background: #fff;
      border: 1px solid #E8E5DF;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #6B7A52 0%, #4e5a3a 100%);
      padding: 24px 28px;
    }

    .card-header p {
      margin: 0;
      color: rgba(255,255,255,0.75);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .card-header h1 {
      margin: 6px 0 0;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card-body { padding: 28px; display: grid; gap: 20px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1px solid #E8E5DF;
      border-radius: 10px;
      background: #FAF8F4;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: #6B7A52;
      box-shadow: 0 0 0 3px rgba(107,122,82,0.15);
    }

    input::placeholder { color: #aaa; }

    .btn {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: filter 0.15s, transform 0.12s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #6B7A52 0%, #4e5a3a 100%);
      color: #fff;
    }

    .btn-primary:hover { filter: brightness(1.08); }

    .btn-secondary {
      background: rgba(107,122,82,0.1);
      color: #6B7A52;
      border: 1px solid rgba(107,122,82,0.25);
    }

    .btn-secondary:hover { background: rgba(107,122,82,0.16); }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      border: none;
      border-top: 1px solid #E8E5DF;
      margin: 4px 0;
    }

    .status {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
      display: none;
    }

    .status.show { display: block; }
    .status.ok   { background: rgba(107,122,82,0.1); color: #4e5a3a; border: 1px solid rgba(107,122,82,0.2); }
    .status.err  { background: rgba(184,92,56,0.08); color: #8B3A22; border: 1px solid rgba(184,92,56,0.2); }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <p>Baithak &amp; Beyond</p>
    <h1>OTP Test Console</h1>
  </div>

  <div class="card-body">

    <!-- Step 1 — Send OTP -->
    <div>
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <button class="btn btn-primary" id="sendBtn" onclick="sendOTP()">
      Send OTP
    </button>

    <div class="status" id="sendStatus"></div>

    <hr class="divider" />

    <!-- Step 2 — Verify OTP -->
    <div>
      <label for="otp">One-time password</label>
      <input type="text" id="otp" placeholder="6-digit code" maxlength="6"
             inputmode="numeric" pattern="\d{6}" autocomplete="one-time-code" />
    </div>

    <button class="btn btn-secondary" id="verifyBtn" onclick="verifyOTP()">
      Verify OTP
    </button>

    <div class="status" id="verifyStatus"></div>

  </div>
</div>

<script>
  const BASE = '/api/otp';  // relative — works because page is served from Express

  function showStatus(elId, message, isError) {
    const el = document.getElementById(elId);
    el.textContent = message;
    el.className = 'status show ' + (isError ? 'err' : 'ok');
  }

  async function sendOTP() {
    const email   = document.getElementById('email').value.trim();
    const btn     = document.getElementById('sendBtn');

    if (!email) {
      showStatus('sendStatus', 'Please enter an email address.', true);
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Sending…';

    try {
      const res  = await fetch(`${BASE}/send-otp`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email }),
      });

      const data = await res.json();
      showStatus('sendStatus', data.message, !res.ok);
    } catch (err) {
      showStatus('sendStatus', 'Could not reach server. Is it running on port 5000?', true);
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Send OTP';
    }
  }

  async function verifyOTP() {
    const email   = document.getElementById('email').value.trim();
    const otp     = document.getElementById('otp').value.trim();
    const btn     = document.getElementById('verifyBtn');

    if (!email || !otp) {
      showStatus('verifyStatus', 'Enter both email and OTP.', true);
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Verifying…';

    try {
      const res  = await fetch(`${BASE}/verify-otp`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, otp }),
      });

      const data = await res.json();
      showStatus('verifyStatus', data.message, !res.ok);
    } catch (err) {
      showStatus('verifyStatus', 'Could not reach server. Is it running on port 5000?', true);
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Verify OTP';
    }
  }
</script>

</body>
</html>
